# The Site Configuration
# https://github.com/cotes2020/jekyll-theme-chirpy/#readme

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: zh-CN

# Change to your timezone › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Asia/Shanghai

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: xFeng's Tech Blog
tagline: 硬件工程师 | 全栈开发者 | 开源爱好者

description: >-
  分享硬件设计、嵌入式开发、跨平台应用开发经验。
  专注于Rust、Go、Python技术栈。

url: "https://xfengyin.github.io"
baseurl: ""

github:
  username: xfengyin

twitter:
  username:

social:
  name: xFeng
  email: xfengyin@example.com
  links:
    - https://github.com/xfengyin

# Site Verification Settings
webmaster_verifications:
  google: # 请到Google Search Console获取验证代码
  bing: # 请到Bing Webmaster Tools获取验证代码
  baidu: # 请到百度站长平台获取验证代码
  alexa:
  yandex:
  facebook:

# ↑ --------------------------

google_analytics:
  id: # 请替换为您的Google Analytics追踪ID，格式如 G-XXXXXXXXXX
  pv:
    proxy_endpoint:
    cache_path:

goatcounter:
  id:

theme_mode: light  # 默认浅色模式 [light | dark]

img_cdn:

avatar: https://github.com/xfengyin.png

social_preview_image: /assets/img/covers/default-tech.png

toc: true

comments:
  active: giscus
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo: xfengyin/xfengyin.github.io
    repo_id: R_kgDOLa_5-g
    category: General
    category_id: DIC_kwDOLa_5-s4CdxD_
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

assets:
  self_host:
    enabled: true
    env: production

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img
    values:
      sitemap: false

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - "*.config.js"
  - package*.json
  - ".git*"
  - ".sass-cache"
  - ".jekyll-cache"
  - "gemfiles"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor/bundle/"
  - "vendor/cache/"
  - "vendor/gems/"
  - "vendor/ruby/"

plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
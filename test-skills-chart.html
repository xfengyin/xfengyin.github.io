<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能雷达图测试</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .content {
            padding: 40px;
        }
        
        .chart-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            height: 500px;
        }
        
        .chart-wrapper {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        #skillsChart {
            width: 100% !important;
            height: 100% !important;
        }
        
        .data-display {
            margin-top: 40px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
        }
        
        .data-display h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .skill-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 4px solid #667eea;
        }
        
        .skill-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .skill-name {
            font-weight: 600;
            color: #2d3748;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        
        .skill-level {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .level-bar {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .level-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        .level-value {
            font-weight: 600;
            color: #667eea;
            min-width: 40px;
        }
        
        .instructions {
            margin-top: 40px;
            background: #e6f7ff;
            border-radius: 15px;
            padding: 25px;
            border-left: 4px solid #1890ff;
        }
        
        .instructions h3 {
            color: #1890ff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .instructions ul {
            list-style: none;
            padding-left: 0;
        }
        
        .instructions li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
            line-height: 1.6;
        }
        
        .instructions li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #1890ff;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #718096;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            background: #f8f9fa;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
            
            .chart-container {
                height: 400px;
            }
            
            .chart-wrapper {
                padding: 20px;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>技能雷达图展示</h1>
            <p>使用 Chart.js 和自定义 JavaScript 实现的技术技能可视化展示</p>
        </div>
        
        <div class="content">
            <div class="chart-wrapper">
                <div class="chart-container">
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>
            
            <div class="data-display">
                <h2>技能详情</h2>
                <div class="skills-grid" id="skillsList">
                    <!-- 技能列表将通过 JavaScript 动态生成 -->
                </div>
            </div>
            
            <div class="instructions">
                <h3>功能说明</h3>
                <ul>
                    <li>雷达图展示各项技术技能的水平</li>
                    <li>点击雷达图上的点可以查看技能详情</li>
                    <li>响应式设计，适配各种屏幕尺寸</li>
                    <li>平滑的动画过渡效果</li>
                    <li>支持从数据文件动态加载技能数据</li>
                </ul>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2024 技能展示系统 | 使用 Chart.js 和自定义 JavaScript 实现</p>
        </div>
    </div>

    <!-- 技能数据（模拟 _data/skills.yml 的内容） -->
    <script type="application/json" id="skillsData">
    {
        "skills": [
            { "name": "Python", "level": 85, "color": "#3776AB", "description": "Web开发、数据分析、自动化脚本" },
            { "name": "JavaScript", "level": 80, "color": "#F7DF1E", "description": "前端开发、Node.js后端、React/Vue" },
            { "name": "TypeScript", "level": 75, "color": "#3178C6", "description": "类型安全的JavaScript开发" },
            { "name": "Rust", "level": 70, "color": "#000000", "description": "系统编程、高性能应用" },
            { "name": "Go", "level": 65, "color": "#00ADD8", "description": "并发编程、微服务、CLI工具" },
            { "name": "嵌入式开发", "level": 75, "color": "#5C6BC0", "description": "单片机、RTOS、硬件驱动" },
            { "name": "系统架构", "level": 80, "color": "#FF7043", "description": "分布式系统、微服务架构" },
            { "name": "DevOps", "level": 70, "color": "#66BB6A", "description": "CI/CD、容器化、云原生" }
        ]
    }
    </script>

    <!-- 引入技能图表脚本 -->
    <script src="assets/js/skills-chart.js"></script>
    
    <!-- 额外的测试脚本 -->
    <script>
        // 等待技能图表加载完成后，更新技能列表
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const skillsData = JSON.parse(document.getElementById('skillsData').textContent);
                const skillsList = document.getElementById('skillsList');
                
                skillsData.skills.forEach(skill => {
                    const skillItem = document.createElement('div');
                    skillItem.className = 'skill-item';
                    skillItem.innerHTML = `
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-level">
                            <div class="level-bar">
                                <div class="level-fill" style="width: ${skill.level}%"></div>
                            </div>
                            <div class="level-value">${skill.level}%</div>
                        </div>
                        <div style="margin-top: 8px; font-size: 0.9rem; color: #718096;">${skill.description}</div>
                    `;
                    skillsList.appendChild(skillItem);
                });
            }, 1000);
        });
    </script>
</body>
</html>
